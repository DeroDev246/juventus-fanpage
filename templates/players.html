{% extends "base.html" %}
{% block title %}Squad — Juventus FC{% endblock %}
{% block head %}
<style>
    .page-hero {
        padding: 5rem 4rem 3rem;
        border-bottom: 1px solid #1a1a1a;
        position: relative;
        overflow: hidden;
    }
    .page-hero-bg {
        position: absolute; inset: 0; z-index: 0;
        background: repeating-linear-gradient(
            -45deg, #0a0a0a, #0a0a0a 20px, #0c0c0c 20px, #0c0c0c 40px
        );
    }
    .page-hero-content { position: relative; z-index: 1; }
    .page-hero-word {
        font-family: 'Bebas Neue', cursive;
        font-size: clamp(5rem, 15vw, 14rem);
        color: rgba(255,255,255,0.03);
        position: absolute;
        right: -1rem;
        bottom: -1rem;
        line-height: 1;
        pointer-events: none;
        z-index: 0;
    }

    .filter-bar {
        display: flex; gap: 0.5rem; flex-wrap: wrap;
        padding: 1.5rem 4rem;
        background: var(--gray);
        border-bottom: 1px solid #1a1a1a;
        position: sticky; top: 64px; z-index: 50;
    }
    .filter-btn {
        font-family: 'DM Mono', monospace;
        font-size: 0.65rem;
        letter-spacing: 2px;
        text-transform: uppercase;
        padding: 0.4rem 1rem;
        border-radius: 2px;
        border: 1px solid var(--gray-light);
        background: transparent;
        color: var(--text-muted);
        cursor: pointer;
        transition: all 0.2s;
    }
    .filter-btn:hover, .filter-btn.active {
        border-color: var(--gold);
        color: var(--gold);
        background: rgba(212,168,67,0.08);
    }

    .squad-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
        gap: 1px;
        background: #151515;
        padding: 1px;
    }

    .player-card {
        background: var(--black);
        padding: 2rem;
        display: flex; gap: 1.5rem;
        align-items: center;
        text-decoration: none;
        color: var(--white);
        transition: background 0.2s;
        position: relative;
        overflow: hidden;
    }
    .player-card::after {
        content: '';
        position: absolute; left: 0; top: 0; bottom: 0;
        width: 3px;
        background: var(--gold);
        transform: scaleY(0);
        transition: transform 0.2s;
        transform-origin: bottom;
    }
    .player-card:hover { background: var(--gray); }
    .player-card:hover::after { transform: scaleY(1); }

    .player-avatar {
        width: 72px; height: 72px;
        flex-shrink: 0;
        border-radius: 50%;
        background: linear-gradient(135deg, #151515, var(--gray-mid));
        border: 2px solid var(--gray-light);
        display: flex; align-items: center; justify-content: center;
        font-family: 'Bebas Neue', cursive;
        font-size: 1.4rem;
        color: var(--gold);
        position: relative;
        transition: border-color 0.2s;
    }
    .player-card:hover .player-avatar { border-color: var(--gold); }
    .player-number-badge {
        position: absolute; bottom: -4px; right: -4px;
        width: 22px; height: 22px;
        background: var(--gold);
        color: var(--black);
        border-radius: 50%;
        font-family: 'Bebas Neue', cursive;
        font-size: 0.75rem;
        display: flex; align-items: center; justify-content: center;
        border: 1px solid var(--black);
    }

    .player-info { flex: 1; min-width: 0; }
    .player-name {
        font-weight: 600;
        font-size: 1rem;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        margin-bottom: 4px;
    }
    .player-pos-nat {
        font-family: 'DM Mono', monospace;
        font-size: 0.65rem;
        letter-spacing: 1px;
        color: var(--text-muted);
        margin-bottom: 0.75rem;
    }
    .player-quick-stats {
        display: flex; gap: 1.5rem;
    }
    .pqs { text-align: center; }
    .pqs .v {
        font-family: 'Bebas Neue', cursive;
        font-size: 1.4rem;
        color: var(--gold);
        display: block;
        line-height: 1;
    }
    .pqs .l {
        font-family: 'DM Mono', monospace;
        font-size: 0.5rem;
        letter-spacing: 1px;
        text-transform: uppercase;
        color: var(--text-muted);
    }

    .player-rating {
        flex-shrink: 0;
        text-align: center;
    }
    .rating-circle {
        width: 48px; height: 48px;
        border-radius: 50%;
        background: conic-gradient(var(--gold) 0deg, var(--gray-mid) 0deg);
        display: flex; align-items: center; justify-content: center;
        position: relative;
    }
    .rating-inner {
        width: 38px; height: 38px;
        background: var(--black);
        border-radius: 50%;
        display: flex; align-items: center; justify-content: center;
        font-family: 'Bebas Neue', cursive;
        font-size: 1rem;
        color: var(--gold);
    }
    .rating-lbl {
        font-family: 'DM Mono', monospace;
        font-size: 0.5rem;
        letter-spacing: 1px;
        text-transform: uppercase;
        color: var(--text-muted);
        text-align: center;
        margin-top: 4px;
    }

    .section-divider {
        padding: 1.5rem 4rem;
        font-family: 'Bebas Neue', cursive;
        font-size: 0.8rem;
        letter-spacing: 4px;
        color: var(--gold);
        background: var(--gray);
        border-top: 1px solid #1f1f1f;
        border-bottom: 1px solid #1f1f1f;
    }

    .hidden { display: none !important; }

    @media (max-width: 768px) {
        .page-hero { padding: 4rem 1.5rem 2rem; }
        .filter-bar { padding: 1rem 1.5rem; }
        .squad-grid { grid-template-columns: 1fr; }
    }
</style>
{% endblock %}
{% block content %}
<section class="page-hero">
    <div class="page-hero-bg"></div>
    <div class="page-hero-word">SQUAD</div>
    <div class="page-hero-content">
        <p class="section-label">2023/24 Season</p>
        <h1 class="section-title">THE<br>SQUAD</h1>
        <div class="gold-line"></div>
        <p style="color:var(--text-muted);font-size:0.9rem;max-width:400px;line-height:1.7;">
            Click any player to view full stats, career highlights, and recent match performances.
        </p>
    </div>
</section>

<div class="filter-bar">
    <button class="filter-btn active" data-filter="all">All Players</button>
    <button class="filter-btn" data-filter="Goalkeeper">Goalkeepers</button>
    <button class="filter-btn" data-filter="Defender">Defenders</button>
    <button class="filter-btn" data-filter="Midfielder">Midfielders</button>
    <button class="filter-btn" data-filter="Forward,Winger">Forwards</button>
</div>

<div id="squad-container"></div>

<script>
let allPlayers = [];

const positions = ['Goalkeeper', 'Defender', 'Midfielder', 'Winger', 'Forward'];
const groupLabels = {
    'Goalkeeper': 'GOALKEEPERS',
    'Defender': 'DEFENDERS',
    'Midfielder': 'MIDFIELDERS',
    'Winger': 'WINGERS & FORWARDS',
    'Forward': ''
};

function getRatingDeg(rating) {
    return Math.round((rating / 10) * 360);
}

function renderPlayers(players) {
    const container = document.getElementById('squad-container');
    const grouped = {};
    players.forEach(p => {
        const grp = p.position;
        if (!grouped[grp]) grouped[grp] = [];
        grouped[grp].push(p);
    });

    let html = '';
    const order = ['Goalkeeper', 'Defender', 'Midfielder', 'Winger', 'Forward'];
    order.forEach(pos => {
        if (!grouped[pos]) return;
        const label = pos === 'Winger' ? 'WINGERS & FORWARDS' : pos.toUpperCase() + 'S';
        html += `<div class="section-divider">${label}</div>`;
        html += `<div class="squad-grid">`;
        grouped[pos].forEach(p => {
            const deg = getRatingDeg(p.rating);
            html += `
            <a href="/players/${p.id}" class="player-card" data-position="${p.position}">
                <div class="player-avatar">
                    <img src="static/images/players/${p.id}.png"
                        onerror="this.style.display='none';this.nextElementSibling.style.display='flex';"
                        style="width:100%;height:100%;border-radius:50%;object-fit:cover;object-position:top;">
                    <span style="display:none;width:100%;height:100%;align-items:center;justify-content:center;font-family:'Bebas Neue',cursive;font-size:1.4rem;color:var(--gold);">
                        ${p.image_initials}
                    </style>    
                    
                    <div class="player-number-badge">${p.number}</div>
                </div>
                <div class="player-info">
                    <div class="player-name">${p.name}</div>
                    <div class="player-pos-nat">${p.position} · ${p.nationality} · Age ${p.age}</div>
                    <div class="player-quick-stats">
                        <div class="pqs"><span class="v">${p.goals}</span><span class="l">Goals</span></div>
                        <div class="pqs"><span class="v">${p.assists}</span><span class="l">Assists</span></div>
                        <div class="pqs"><span class="v">${p.appearances}</span><span class="l">Apps</span></div>
                    </div>
                </div>
                <div class="player-rating">
                    <div class="rating-circle" style="background: conic-gradient(var(--gold) ${deg}deg, var(--gray-mid) ${deg}deg);">
                        <div class="rating-inner">${p.rating}</div>
                    </div>
                    <div class="rating-lbl">Rating</div>
                </div>
            </a>`;
        });
        html += `</div>`;
    });

    container.innerHTML = html;
}

// Filter logic
document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        const filter = btn.dataset.filter;
        if (filter === 'all') {
            renderPlayers(allPlayers);
        } else {
            const filters = filter.split(',');
            renderPlayers(allPlayers.filter(p => filters.includes(p.position)));
        }
    });
});

fetch('/api/players/')
    .then(r => r.json())
    .then(players => {
        allPlayers = players;
        renderPlayers(players);
    });
</script>
{% endblock %}
