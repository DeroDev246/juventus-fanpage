upstream juventus_app {
    # Multiple workers for load balancing
    server app:8000;
    keepalive 32;
}

# Cache static files
proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=static_cache:10m max_size=500m inactive=60m;

server {
    listen 80;
    server_name _;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css application/json application/javascript text/javascript;
    gzip_min_length 1000;

    # Static files — served directly by nginx (very fast)
    location /static/ {
        alias /app/static/;
        expires 7d;
        add_header Cache-Control "public, immutable";
        proxy_cache static_cache;
    }

    # API routes — short cache (live data)
    location /api/matches/live {
        proxy_pass http://juventus_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        # No cache for live scores
        add_header Cache-Control "no-cache, no-store";
    }

    location /api/ {
        proxy_pass http://juventus_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        # Short cache for other API endpoints
        proxy_cache static_cache;
        proxy_cache_valid 200 30s;
        add_header X-Cache-Status $upstream_cache_status;
    }

    # HTML pages — proxy to FastAPI
    location / {
        proxy_pass http://juventus_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        # Matchday traffic handling
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 16 4k;
    }

    # Rate limiting for matchday spike protection
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;
    location /api/matches/live {
        limit_req zone=api_limit burst=50 nodelay;
        proxy_pass http://juventus_app;
    }
}
